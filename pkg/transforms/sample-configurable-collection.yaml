apiVersion: search.open-cluster-management.io/v1alpha1
kind: CollectionConfig
metadata:
  name: collection-config
  namespace: open-cluster-management
spec:
  collectNamespaces:
    namespaceSelector:
      include:
        - "open-cluster-management"
      exclude:
        - "closed-cluster-management"
      matchExpressions: []
      matchLabels: {}
  collectionRules:
    # Allow all resources by default
    - action: Include
      resourceSelector:
        apiGroups:
          - "*"
        kinds:
          - "*"
    # Exclude coordination.k8s.io leases
    - action: Exclude
      resourceSelector:
        apiGroups:
          - "coordination.k8s.io"
        kinds:
          - "leases"
    # Collect additional fields for Pods
    - action: Include
      resourceSelector:
        apiGroups:
          - ""
        kinds:
          - "Pod"
      fields:
        - name: "dnsPolicy"
          jsonPath: "{.spec.dnsPolicy}"
        - name: "enableServiceLinks"
          jsonPath: "{.spec.enableServiceLinks}"
    # Collect additional fields and metadata for Search resources
    - action: Include
      resourceSelector:
        apiGroups:
          - "search.open-cluster-management.io"
        kinds:
          - "Search"
      fields:
        - name: "searchPGStorage"
          jsonPath: "{.spec.dbStorage.size}"
          type: "DataTypeBytes"
      collectAnnotations: true
      collectConditions: true
      collectAdditionalPrinterColumnsPriority: 0
